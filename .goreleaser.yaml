version: 2

builds:
  - main: ./cmd/semantic
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: binary
    name_template: "semantic-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: checksums.txt

brews:
  - name: semantic
    repository:
      owner: pinchtab
      name: homebrew-tap
      branch: "brew-{{ .ProjectName }}-{{ .Version }}"
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
      pull_request:
        enabled: true
        base:
          owner: pinchtab
          name: homebrew-tap
          branch: main
    directory: Formula
    homepage: "https://github.com/pinchtab/semantic"
    description: "Zero-dependency semantic matching for accessibility tree elements"
    license: "MIT"
    test: |
      system "#{bin}/semantic version"
    install: |
      bin.install Dir["semantic*"].first => "semantic"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^ci:'
      - '^chore:'

release:
  github:
    owner: pinchtab
    name: semantic
