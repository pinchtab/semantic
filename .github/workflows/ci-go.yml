name: CI / Go

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - 'tests/e2e/assets/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - 'tests/e2e/assets/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    uses: ./.github/workflows/reusable-go.yml
    with:
      ref: ${{ github.sha }}
